<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Shepherd — Control Hub</title>
<style>
:root {
  --g:      #060c14;
  --s:      #0b1520;
  --s2:     #0f1d2e;
  --b:      #152030;
  --b2:     #1c2f45;
  --t:      #a8bac8;
  --th:     #d4e4f0;
  --dim:    #3a5068;
  --dim2:   #4e6880;
  --am:     #f0a500;
  --am-bg:  rgba(240,165,0,.07);
  --am-dim: rgba(240,165,0,.15);
  --gr:     #1fc95e;
  --gr-bg:  rgba(31,201,94,.07);
  --rd:     #f43f5e;
  --rd-bg:  rgba(244,63,94,.09);
  --rd-hi:  rgba(244,63,94,.18);
  --bl:     #5ba4fb;
  --bl-bg:  rgba(91,164,251,.08);
  --fn:     ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; background:var(--g); color:var(--t); font-family:var(--fn); font-size:12px; overflow:hidden; line-height:1.4; }

/* ── App shell ── */
#app { display:grid; grid-template-rows:44px 1fr 106px; height:100vh; }

/* ── Header ── */
#hdr {
  display:flex; align-items:center; gap:14px;
  padding:0 18px;
  background:var(--s); border-bottom:1px solid var(--b);
}
.logo { color:var(--am); font-size:.68rem; letter-spacing:.24em; text-transform:uppercase; font-weight:700; white-space:nowrap; }
.hsep { color:var(--b2); font-size:.9rem; }
.sdot {
  width:7px; height:7px; border-radius:50%; background:var(--dim);
  display:inline-block; flex-shrink:0; transition:background .3s,box-shadow .3s;
}
.sdot.live   { background:var(--am); box-shadow:0 0 8px var(--am); animation:blink 1.8s ease-in-out infinite; }
.sdot.halted { background:var(--rd); box-shadow:0 0 8px var(--rd); animation:blink .75s ease-in-out infinite; }
.sdot.done   { background:var(--gr); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
#stxt { font-size:.72rem; transition:color .3s; color:var(--dim2); white-space:nowrap; }
#stxt.live   { color:var(--am); }
#stxt.halted { color:var(--rd); font-weight:600; }
#stxt.done   { color:var(--gr); }
#runid { font-size:.65rem; color:var(--dim); white-space:nowrap; }
.mbadge {
  font-size:.58rem; letter-spacing:.12em; text-transform:uppercase;
  padding:2px 8px; border-radius:2px; border:1px solid var(--b2); color:var(--dim2);
  transition:all .3s; white-space:nowrap;
}
.mbadge.live   { border-color:var(--am); color:var(--am); }
.mbadge.locked { border-color:var(--bl); color:var(--bl); }
#clock { margin-left:auto; font-size:.7rem; color:var(--dim2); letter-spacing:.04em; }

/* ── Body ── */
#body {
  display:grid;
  grid-template-columns:212px 1fr 282px;
  overflow:hidden;
  gap:1px; background:var(--b);
}

/* ── Panels ── */
.panel { background:var(--s); display:flex; flex-direction:column; overflow:hidden; }
.plbl {
  font-size:.57rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--dim); padding:9px 14px 7px;
  border-bottom:1px solid var(--b); flex-shrink:0;
  display:flex; align-items:center; gap:8px;
}
.plbl-r { margin-left:auto; font-size:.6rem; color:var(--am); }
.pbody { flex:1; overflow-y:auto; padding:12px 14px; scrollbar-width:thin; scrollbar-color:var(--b2) transparent; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--b2); border-radius:2px; }

/* ── Left column ── */
#left { display:flex; flex-direction:column; gap:1px; background:var(--b); }
#left .panel { flex:1; }

/* Intent panel */
.kv { margin-bottom:11px; }
.kv .k { font-size:.57rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
.kv .v { color:var(--th); font-size:.78rem; word-break:break-word; }
.kv .v.xl { font-size:.95rem; }
.kv .v.rname { color:var(--am); font-size:.82rem; }

.cbar-wrap { height:3px; background:var(--b2); border-radius:2px; overflow:hidden; margin-top:5px; }
.cbar { height:100%; border-radius:2px; background:var(--am); transition:width .6s cubic-bezier(.4,0,.2,1); }

.chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.chip { font-size:.6rem; padding:2px 7px; background:var(--bl-bg); border:1px solid rgba(91,164,251,.22); border-radius:2px; color:var(--bl); }

.vars { margin-top:4px; }
.vrow { display:flex; gap:8px; font-size:.68rem; padding:3px 0; border-bottom:1px solid rgba(21,32,48,.9); }
.vrow:last-child { border:none; }
.vk { color:var(--am); min-width:90px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.vv { color:var(--th); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }

/* Vision panel */
.vis-lead { display:flex; align-items:flex-start; gap:8px; }
.vdot { width:6px; height:6px; border-radius:50%; background:var(--dim); flex-shrink:0; margin-top:4px; }
.vdot.live { background:var(--bl); box-shadow:0 0 5px var(--bl); animation:blink 2.4s ease-in-out infinite; }
.vcur { color:var(--th); font-size:.72rem; font-style:italic; line-height:1.5; }
.vhist { margin-top:8px; }
.vhe { font-size:.64rem; color:var(--dim2); padding:3px 0; border-top:1px solid var(--b); line-height:1.45; }

/* ── DAG ── */
#dag-panel { background:var(--s); display:flex; flex-direction:column; overflow:hidden; }
#dag-scroll { flex:1; overflow-y:auto; padding:16px 22px; scrollbar-width:thin; scrollbar-color:var(--b2) transparent; }
.dag-empty { text-align:center; color:var(--dim); margin-top:80px; line-height:2; }
.dag-empty-sym { font-size:1.6rem; display:block; opacity:.2; margin-bottom:10px; }
.dag-empty-sub { font-size:.65rem; color:var(--dim); }

.dn-wrap { display:flex; flex-direction:column; align-items:center; }
.dn-edge { width:1px; height:18px; background:var(--b2); }
.dn {
  width:100%; max-width:500px;
  border:1px solid var(--b); border-radius:4px;
  padding:10px 14px 9px; position:relative; overflow:hidden;
  transition:border-color .22s, background .22s;
}
.dn-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
.dn-idx { font-size:.6rem; color:var(--dim); min-width:20px; flex-shrink:0; font-weight:600; }
.dn-act-badge {
  font-size:.57rem; letter-spacing:.07em; text-transform:uppercase;
  padding:1px 6px; border-radius:2px; background:var(--b2); color:var(--dim2);
  flex-shrink:0;
}
.dn-hs { font-size:.57rem; color:rgba(240,165,0,.6); flex-shrink:0; }
.dn-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
.dn-mv-badge { font-size:.57rem; letter-spacing:.1em; text-transform:uppercase; padding:1px 6px; border-radius:2px; font-weight:700; display:none; }
.dn-mv-badge.flag { display:inline; background:rgba(240,165,0,.14); color:var(--am); }
.dn-mv-badge.halt { display:inline; background:var(--rd-bg); color:var(--rd); }
.dn-status-icon { font-size:.68rem; color:var(--dim); }

.dn-desc { font-size:.76rem; color:var(--t); line-height:1.45; }
.dn-bot { display:flex; align-items:center; gap:10px; margin-top:5px; }
.dn-dur { font-size:.62rem; color:var(--dim2); }
.dn-err { font-size:.62rem; color:var(--rd); }

/* states */
.dn.active  { border-color:var(--am); background:var(--am-bg); }
.dn.active .dn-idx  { color:var(--am); }
.dn.active .dn-desc { color:var(--th); }
.dn.done    { border-color:rgba(31,201,94,.22); background:var(--gr-bg); }
.dn.done .dn-desc   { color:var(--gr); }
.dn.done .dn-idx    { color:rgba(31,201,94,.55); }
.dn.failed  { border-color:rgba(244,63,94,.35); background:var(--rd-bg); }
.dn.failed .dn-desc { color:var(--rd); }
.dn.halted  { border-color:var(--rd); background:var(--rd-hi); animation:haltglow 1.4s ease-in-out infinite; }
.dn.halted .dn-desc { color:var(--rd); font-weight:600; }
.dn.halted .dn-idx  { color:var(--rd); }
.dn.flagged { border-color:rgba(240,165,0,.35); background:var(--am-bg); }
@keyframes haltglow { 0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,0)} 50%{box-shadow:0 0 16px 3px rgba(244,63,94,.18)} }

/* scanline on active */
.dn.active::after {
  content:''; position:absolute; left:0; top:0; width:100%; height:2px;
  background:var(--am); animation:scan 1.6s linear infinite; opacity:.75;
}
@keyframes scan { 0%{top:0%;opacity:.9} 100%{top:100%;opacity:0} }

/* ── Right column ── */
#right { display:flex; flex-direction:column; gap:1px; background:var(--b); }
#mon-panel { flex:0 0 auto; }
#rpl-panel { flex:1; }

/* Monitor */
#mon-body { padding:12px 14px; }
.mbox {
  border-radius:4px; padding:14px 14px 12px;
  border:1px solid transparent; transition:all .3s;
}
.mbox.ok   { border-color:rgba(31,201,94,.25); background:var(--gr-bg); }
.mbox.flag { border-color:rgba(240,165,0,.3);  background:var(--am-bg); }
.mbox.halt {
  border-color:var(--rd); background:var(--rd-hi);
  animation:haltpulse 1.2s ease-in-out infinite;
}
@keyframes haltpulse {
  0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,0)}
  50%{box-shadow:0 0 24px 4px rgba(244,63,94,.22)}
}
.mv { font-size:.63rem; letter-spacing:.2em; text-transform:uppercase; font-weight:700; margin-bottom:7px; }
.mv.ok   { color:var(--gr); }
.mv.flag { color:var(--am); }
.mv.halt { color:var(--rd); font-size:.82rem; letter-spacing:.15em; }
.mr { font-size:.72rem; color:var(--t); line-height:1.5; }
.mm { font-size:.62rem; color:var(--dim2); margin-top:6px; }

/* Replay */
.rlist { display:flex; flex-direction:column; gap:3px; }
.ri {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:3px; border:1px solid var(--b);
  cursor:pointer; transition:border-color .15s, background .15s;
}
.ri:hover { border-color:var(--b2); background:rgba(21,32,48,.5); }
.ri.sel   { border-color:var(--am); background:var(--am-bg); }
.ri-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.ri-dot.ok  { background:var(--gr); }
.ri-dot.err { background:var(--rd); }
.ri-dot.abt { background:var(--am); }
.ri-id   { font-size:.6rem;  color:var(--dim);  flex-shrink:0; }
.ri-name { font-size:.68rem; color:var(--t);    flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ri-dur  { font-size:.6rem;  color:var(--dim2); flex-shrink:0; }
.rpl-empty { color:var(--dim); font-size:.7rem; text-align:center; padding:22px 0; }

/* ── Log strip ── */
#log-strip { background:var(--s); border-top:1px solid var(--b); display:flex; flex-direction:column; }
#log-hdr {
  font-size:.57rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--dim); padding:6px 18px 4px; border-bottom:1px solid var(--b); flex-shrink:0;
}
#log-body { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--b2) transparent; }
.lr {
  display:grid;
  grid-template-columns:82px 46px 26px 1fr 56px 52px;
  padding:2.5px 18px; gap:10px; align-items:center;
  font-size:.65rem; border-bottom:1px solid rgba(21,32,48,.6);
  animation:fdin .18s ease;
}
@keyframes fdin { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.lt  { color:var(--dim2); white-space:nowrap; }
.lty { font-size:.57rem; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
.li  { color:var(--dim); text-align:right; }
.ld  { color:var(--t); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ls  { font-size:.6rem; }
.ls.ok   { color:var(--gr); }
.ls.fail { color:var(--rd); }
.ls.halt { color:var(--rd); font-weight:700; }
.ls.flag { color:var(--am); }
.ls.act  { color:var(--am); }
.ldur    { text-align:right; }
.ldur span { background:var(--b); border-radius:2px; padding:0 4px; color:var(--dim2); }

/* ── Halt vignette ── */
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:200;
  border:0px solid transparent; opacity:0; transition:opacity .4s;
  box-shadow:inset 0 0 80px rgba(244,63,94,0);
}
#vignette.on {
  border:3px solid var(--rd); opacity:1;
  box-shadow:inset 0 0 80px rgba(244,63,94,.18);
  animation:vgpulse 1.4s ease-in-out infinite;
}
@keyframes vgpulse { 0%,100%{box-shadow:inset 0 0 80px rgba(244,63,94,.12)} 50%{box-shadow:inset 0 0 80px rgba(244,63,94,.28)} }

/* ── Deviation badge on DAG nodes ── */
.dn-mv-badge.dev { display:inline; background:rgba(168,85,247,.14); color:#c084fc; border:1px solid rgba(168,85,247,.25); }

/* ── Risky node badge ── */
.dn-risky {
  font-size:.55rem; color:var(--am); flex-shrink:0;
  background:var(--am-bg); border:1px solid rgba(240,165,0,.22);
  padding:1px 5px; border-radius:2px; letter-spacing:.06em;
}

/* ── Confidence bar under node ── */
.conf-bar-wrap {
  height:2px; background:var(--b2); border-radius:1px;
  overflow:hidden; flex:1; margin-left:6px; min-width:40px;
}
.conf-bar { height:100%; border-radius:1px; transition:width .6s cubic-bezier(.4,0,.2,1); }
.conf-bar.good  { background:var(--gr); }
.conf-bar.warn  { background:var(--am); }
.conf-bar.risky { background:var(--rd); }

/* ── Approval panel inside monitor box ── */
.approval { margin-top:11px; display:none; }
.approval.show { display:block; }
.sugg-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:9px; }
.sugg-chip {
  font-size:.6rem; padding:3px 9px; border-radius:2px; cursor:pointer;
  border:1px solid rgba(91,164,251,.28); background:var(--bl-bg); color:var(--bl);
  font-family:var(--fn); transition:background .12s, border-color .12s;
}
.sugg-chip:hover { background:rgba(91,164,251,.18); border-color:var(--bl); }
.approval-btns { display:flex; gap:6px; }
.btn-approve {
  flex:1; padding:5px 0; border:1px solid rgba(31,201,94,.4);
  background:rgba(31,201,94,.08); color:var(--gr); font-size:.63rem; cursor:pointer;
  border-radius:3px; font-family:var(--fn); text-transform:uppercase; letter-spacing:.1em;
  transition:background .12s;
}
.btn-approve:hover { background:rgba(31,201,94,.18); }
.btn-halt-confirm {
  flex:1; padding:5px 0; border:1px solid rgba(244,63,94,.4);
  background:var(--rd-bg); color:var(--rd); font-size:.63rem; cursor:pointer;
  border-radius:3px; font-family:var(--fn); text-transform:uppercase; letter-spacing:.1em;
  transition:background .12s;
}
.btn-halt-confirm:hover { background:var(--rd-hi); }
.approval-countdown {
  font-size:.6rem; color:var(--dim2); margin-top:7px; text-align:center; letter-spacing:.04em;
}
.override-row { display:none; margin-top:7px; gap:5px; }
.override-row.show { display:flex; }
.override-input {
  flex:1; background:var(--b2); border:1px solid var(--b2); color:var(--th);
  font-size:.65rem; padding:4px 8px; border-radius:3px; font-family:var(--fn);
  transition:border-color .15s;
}
.override-input:focus { outline:none; border-color:var(--bl); }
.btn-send {
  padding:4px 10px; border:1px solid rgba(91,164,251,.35);
  background:var(--bl-bg); color:var(--bl); font-size:.6rem; cursor:pointer;
  border-radius:3px; font-family:var(--fn); text-transform:uppercase; letter-spacing:.08em;
}
.mhist { font-size:.6rem; color:var(--am); margin-top:6px; line-height:1.5; }
</style>
</head>
<body>
<div id="vignette"></div>
<div id="app">

<!-- Header -->
<div id="hdr">
  <span class="logo">◈ Shepherd</span>
  <span class="hsep">|</span>
  <span class="sdot" id="sdot"></span>
  <span id="stxt">Idle</span>
  <span class="hsep">|</span>
  <span id="runid"></span>
  <span class="mbadge" id="mbadge">—</span>
  <span id="clock"></span>
</div>

<!-- Body -->
<div id="body">

  <!-- Left: Intent + Vision -->
  <div id="left">
    <div class="panel">
      <div class="plbl">Intent</div>
      <div class="pbody">
        <div class="kv"><div class="k">Raw text</div><div class="v xl" id="iraw">—</div></div>
        <div class="kv"><div class="k">Routine</div><div class="v rname" id="iroutine">—</div></div>
        <div class="kv">
          <div class="k">Confidence</div>
          <div class="v" id="iconf">—</div>
          <div class="cbar-wrap"><div class="cbar" id="cbar" style="width:0%"></div></div>
        </div>
        <div class="kv"><div class="k">Keywords</div><div class="chips" id="ikw"></div></div>
        <div class="kv"><div class="k">Variables</div><div class="vars" id="ivars"></div></div>
      </div>
    </div>
    <div class="panel">
      <div class="plbl">Vision Audit</div>
      <div class="pbody">
        <div class="vis-lead">
          <div class="vdot" id="vdot"></div>
          <div class="vcur" id="vcur">Waiting for stream…</div>
        </div>
        <div class="vhist" id="vhist"></div>
      </div>
    </div>
  </div>

  <!-- Center: DAG -->
  <div id="dag-panel" class="panel">
    <div class="plbl">
      Execution DAG
      <span class="plbl-r" id="dag-count"></span>
    </div>
    <div id="dag-scroll">
      <div class="dag-empty" id="dag-empty">
        <span class="dag-empty-sym">◈</span>
        Waiting for execution…
        <br><span class="dag-empty-sub">Speak an intent or type one to begin</span>
      </div>
      <div id="dag-nodes"></div>
    </div>
  </div>

  <!-- Right: Monitor + Replay -->
  <div id="right">
    <div class="panel" id="mon-panel">
      <div class="plbl">Monitor / Alert</div>
      <div id="mon-body">
        <div class="mbox ok" id="mbox">
          <div class="mv ok" id="mv">● All Clear</div>
          <div class="mr" id="mr">No anomalies detected</div>
          <div class="mm" id="mm"></div>
          <div class="mhist" id="mhist"></div>
          <!-- Intervention panel: shown when awaiting human decision -->
          <div class="approval" id="approval">
            <div class="sugg-row" id="sugg-row"></div>
            <div class="approval-btns">
              <button class="btn-approve" onclick="sendDecision('approve')">✓ Approve</button>
              <button class="btn-halt-confirm" onclick="sendDecision('halt')">■ Halt</button>
              <button class="sugg-chip" onclick="toggleOverride()">Custom…</button>
            </div>
            <div class="override-row" id="override-row">
              <input class="override-input" id="override-input" placeholder="Enter override instruction…">
              <button class="btn-send" onclick="sendOverride()">Send</button>
            </div>
            <div class="approval-countdown" id="approval-countdown"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel" id="rpl-panel">
      <div class="plbl">Replay</div>
      <div class="pbody">
        <div class="rlist" id="rlist">
          <div class="rpl-empty">No past runs yet</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- #body -->

<!-- Log Strip -->
<div id="log-strip">
  <div id="log-hdr">Live Action Log</div>
  <div id="log-body"></div>
</div>

</div><!-- #app -->

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  runId: null, routineId: null, stepsTotal: 0, nodeStates: {},
  routineSteps: {},   // index → {action, description, high_stakes}
  highStakes: new Set(),
  vhist: [], status: 'idle',
};

// ── Clock ──────────────────────────────────────────────────────────────────
(function tick(){
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
  requestAnimationFrame(tick);
})();

// ── WebSocket ──────────────────────────────────────────────────────────────
let ws = null;
function connect(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(_){} };
  ws.onclose   = () => setTimeout(connect, 2000);
  ws.onerror   = () => ws.close();
}
connect();
loadRuns();

// ── Event dispatch ─────────────────────────────────────────────────────────
function handle({type, data}){
  switch(type){
    case 'intent.received':    onIntent(data);    break;
    case 'intent.unmatched':   onUnmatched(data); break;
    case 'routine.resolved':   onResolved(data);  break;
    case 'execution.start':    onExecStart(data); break;
    case 'step.start':         onStepStart(data); break;
    case 'step.complete':      onStepDone(data);  break;
    case 'step.error':         onStepErr(data);   break;
    case 'execution.complete': onExecDone(data);        break;
    case 'execution.halted':   onHalted(data);          break;
    case 'monitor.alert':      onMonitor(data);         break;
    case 'monitor.decision':   onMonitorDecision(data); break;
    case 'step.deviation':     onDeviation(data);       break;
    case 'vision.update':      onVision(data);          break;
    case 'vision.offline':     onVisionOff();           break;
  }
}

// ── Handlers ───────────────────────────────────────────────────────────────
function onIntent(d){
  $t('iraw', d.raw_text || '—');
  $t('iroutine', '—');
  $t('iconf', '—');
  $('cbar').style.width = '0%';
  $('ikw').innerHTML = '';
  $('ivars').innerHTML = '';
  setStatus('routing', 'Routing…');
  log('INTENT', '—', d.raw_text, '', '');
}

function onUnmatched(d){
  setStatus('idle', 'No match');
  log('ROUTER', '—', 'No routine matched: ' + d.raw_text, 'fail', '');
}

function onResolved(d){
  $t('iroutine', d.routine_id || '—');
  const pct = Math.round((d.confidence || 0) * 100);
  $t('iconf', pct + '%');
  $('cbar').style.width = pct + '%';

  const kc = $('ikw'); kc.innerHTML = '';
  (d.matched_keywords || []).forEach(k => {
    const t = mk('span', 'chip'); t.textContent = k; kc.appendChild(t);
  });

  const vc = $('ivars'); vc.innerHTML = '';
  Object.entries(d.variables || {}).forEach(([k, v]) => {
    const r = mk('div', 'vrow');
    r.innerHTML = `<span class="vk">${x(k)}</span><span class="vv">${x(v)}</span>`;
    vc.appendChild(r);
  });

  // routine.resolved fires before execution.start, so pre-fetch for early DAG population
  if(d.routine_id) fetchRoutine(d.routine_id);
}

async function fetchRoutine(rid){
  try {
    const res = await fetch('/api/routines/' + rid);
    if(!res.ok) return;
    const data = await res.json();
    S.routineSteps = {};
    S.highStakes = new Set(data.high_stakes_steps || []);
    (data.steps || []).forEach(s => { S.routineSteps[s.index] = s; });
  } catch(_){}
}

function onExecStart(d){
  S.runId      = d.run_id;
  S.stepsTotal = d.total_steps;
  S.nodeStates = {};
  S.routineId  = d.routine_id;
  // Use step descriptions sent inline with execution.start (beats async API fetch)
  if(d.steps && d.steps.length){
    S.routineSteps = {};
    S.highStakes   = new Set();
    d.steps.forEach(s => {
      S.routineSteps[s.index] = s;
      if(s.high_stakes) S.highStakes.add(s.index);
    });
  }

  $t('runid', 'run ' + d.run_id + ' · ');
  const b = $('mbadge');
  b.textContent = d.mode || '—';
  b.className = 'mbadge ' + (d.mode === 'LIVE' ? 'live' : d.mode === 'LOCKED' ? 'locked' : '');

  setStatus('live', 'Running');
  resetMon();
  vignette(false);
  buildDAG(d.total_steps);
  $t('dag-count', d.total_steps + ' steps');
  log('EXEC', '—', 'Started · ' + d.routine_id, 'ok', '');
  // Fetch evolution stats to show historical confidence on nodes
  if(d.routine_id) fetchStats(d.routine_id);
}

function onStepStart(d){
  S.nodeStates[d.index] = 'active';
  const desc = d.description || d.action || '';
  updateNode(d.index, 'active', desc, null, null);
  scrollTo(d.index);
  log('STEP', d.index, desc, 'act', '');
}

function onStepDone(d){
  S.nodeStates[d.index] = 'done';
  updateNode(d.index, 'done', null, d.duration_ms, null);
  log('STEP', d.index, null, 'ok', d.duration_ms);
}

function onStepErr(d){
  S.nodeStates[d.index] = 'failed';
  updateNode(d.index, 'failed', d.error, null, null);
  log('ERROR', d.index, d.error, 'fail', '');
}

function onExecDone(d){
  const st = d.status === 'completed' ? 'done' : d.status === 'aborted' ? 'halted' : 'failed';
  setStatus(st, d.status === 'completed' ? 'Completed' : d.status === 'aborted' ? 'Halted' : 'Failed');
  log('EXEC', '—', d.status.toUpperCase() + ' · ' + d.duration_ms + 'ms',
    d.status === 'completed' ? 'ok' : 'fail', d.duration_ms);
  if(d.status !== 'aborted') vignette(false);
  setTimeout(loadRuns, 1200);
  // Refresh evolution stats after the run so confidence bars reflect latest data
  if(S.routineId) setTimeout(() => fetchStats(S.routineId), 1500);
}

function onHalted(d){
  setStatus('halted', 'HALTED');
  updateNode(d.step_index, 'halted', 'Execution halted', null, 'halt');
  vignette(true);
  log('HALT', d.step_index, d.reason || 'halt requested', 'halt', '');
}

function onMonitor(d){
  const box = $('mbox');
  box.className = 'mbox ' + d.verdict;
  const mv = $('mv'); mv.className = 'mv ' + d.verdict;
  if(d.verdict === 'halt'){
    mv.textContent = '■ HALT — Awaiting Decision';
    setStatus('halted', 'HALTED');
    vignette(true);
    updateNode(d.step_index, 'halted', null, null, 'halt');
  } else {
    mv.textContent = '▲ FLAG — Review Required';
    updateNode(d.step_index, 'flagged', null, null, 'flag');
  }
  $t('mr', d.reason || '');
  $t('mm', (d.trigger ? 'trigger: ' + d.trigger + ' · ' : '') + 'step ' + d.step_index);
  $t('mhist', d.history_note || '');

  if(d.awaiting_approval){
    // Populate suggestion chips
    const sr = $('sugg-row'); sr.innerHTML = '';
    (d.suggestions || []).forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'sugg-chip';
      chip.textContent = s.label;
      chip.onclick = () => sendDecision(s.action);
      sr.appendChild(chip);
    });
    $('approval').classList.add('show');
    const defaultAct = d.verdict === 'halt' ? 'halt' : 'approve';
    startApprovalTimer(defaultAct);
  }

  log('MON', d.step_index, d.reason, d.verdict === 'halt' ? 'halt' : 'flag', '');
}

function onMonitorDecision(d){
  hideApproval();
  if(d.decision === 'approve'){
    $('mbox').className = 'mbox ok';
    $('mv').className = 'mv ok';
    $t('mv', '● Approved — Continuing');
    $t('mr', 'Human approved this step');
    vignette(false);
  }
  log('MON', d.step_index, 'decision: ' + d.decision,
      d.decision === 'halt' ? 'halt' : 'ok', '');
}

function onDeviation(d){
  updateNodeDeviation(d.step_index, d.reason);
  log('DEV', d.step_index, d.reason || 'deviation detected', 'flag', '');
}

function onVision(d){
  $('vdot').className = 'vdot live';
  $t('vcur', '"' + d.description + '"');
  S.vhist.unshift(d.description);
  if(S.vhist.length > 7) S.vhist.pop();
  $('vhist').innerHTML = S.vhist.slice(1).map(t =>
    `<div class="vhe">${x(t)}</div>`
  ).join('');
}

function onVisionOff(){
  $('vdot').className = 'vdot';
  $t('vcur', 'vision audit offline');
}

// ── DAG ────────────────────────────────────────────────────────────────────
function buildDAG(total){
  $('dag-empty').style.display = 'none';
  const c = $('dag-nodes'); c.innerHTML = '';

  for(let i = 0; i < total; i++){
    if(i > 0){
      const ew = mk('div', 'dn-wrap');
      ew.appendChild(mk('div', 'dn-edge'));
      c.appendChild(ew);
    }
    const rs   = S.routineSteps[i] || {};
    const desc = rs.description || '—';
    const act  = rs.action || '';
    const hs   = S.highStakes.has(i);

    const w = mk('div', 'dn-wrap');
    const n = mk('div', 'dn pending'); n.id = 'dn-' + i;
    n.innerHTML = `
      <div class="dn-top">
        <span class="dn-idx">${String(i).padStart(2, '0')}</span>
        ${act ? `<span class="dn-act-badge">${x(act)}</span>` : ''}
        ${hs  ? `<span class="dn-hs">⚑ monitored</span>` : ''}
        <span class="dn-mv-badge" id="dnb-${i}"></span>
        <span id="dnrisk-${i}"></span>
        <span class="dn-right">
          <span class="dn-status-icon" id="dni-${i}">·</span>
        </span>
      </div>
      <div class="dn-desc" id="dnd-${i}">${x(desc)}</div>
      <div class="dn-bot">
        <span class="dn-dur" id="dndu-${i}"></span>
        <span class="dn-err" id="dner-${i}"></span>
        <span class="conf-bar-wrap" id="dnconf-wrap-${i}" style="display:none">
          <div class="conf-bar" id="dnconf-${i}"></div>
        </span>
      </div>`;
    w.appendChild(n);
    c.appendChild(w);
  }
}

function updateNode(i, state, desc, durMs, verdict){
  const n = document.getElementById('dn-' + i);
  if(!n) return;
  n.className = 'dn ' + state;

  if(desc != null){
    const d = document.getElementById('dnd-' + i);
    if(d) d.textContent = desc;
  }
  if(durMs != null){
    const d = document.getElementById('dndu-' + i);
    if(d) d.textContent = durMs + 'ms';
  }

  const icon = document.getElementById('dni-' + i);
  const badge = document.getElementById('dnb-' + i);
  if(icon){
    const icons = {active:'◉', done:'✓', failed:'✕', halted:'■', flagged:'▲', pending:'·'};
    const colors = {active:'var(--am)', done:'var(--gr)', failed:'var(--rd)',
                    halted:'var(--rd)', flagged:'var(--am)', pending:'var(--dim)'};
    icon.textContent = icons[state] || '·';
    icon.style.color = colors[state] || 'var(--dim)';
  }
  if(badge && verdict){
    badge.className = 'dn-mv-badge ' + verdict;
    badge.textContent = verdict === 'halt' ? '■ halt' : '▲ flag';
  }
}

function scrollTo(i){
  const n = document.getElementById('dn-' + i);
  if(n) n.scrollIntoView({block:'nearest', behavior:'smooth'});
}

// ── Replay ─────────────────────────────────────────────────────────────────
function loadRuns(){
  fetch('/api/runs').then(r => r.json()).then(renderRuns).catch(() => {});
}

function renderRuns(runs){
  const list = $('rlist');
  if(!runs || !runs.length){
    list.innerHTML = '<div class="rpl-empty">No past runs yet</div>';
    return;
  }
  list.innerHTML = runs.slice(0, 20).map(r => {
    const dur = r.ended_at && r.started_at
      ? Math.round((r.ended_at - r.started_at) * 1000) + 'ms' : '—';
    const failed  = r.steps && r.steps.some(s => s.status === 'failed');
    const aborted = r.steps && r.steps.some(s => s.status === 'halted');
    const dot = failed ? 'err' : aborted ? 'abt' : 'ok';
    return `<div class="ri" data-rid="${x(r.run_id)}" onclick="loadRun('${x(r.run_id)}')">
      <div class="ri-dot ${dot}"></div>
      <span class="ri-id">${x(r.run_id)}</span>
      <span class="ri-name">${x(r.routine_id || '—')}</span>
      <span class="ri-dur">${dur}</span>
    </div>`;
  }).join('');
}

function loadRun(rid){
  fetch('/api/runs/' + encodeURIComponent(rid))
    .then(r => r.json())
    .then(run => {
      if(run.error) return;
      document.querySelectorAll('.ri').forEach(e => e.classList.remove('sel'));
      const el = document.querySelector(`.ri[data-rid="${rid}"]`);
      if(el) el.classList.add('sel');

      const steps = run.steps || [];
      // Pre-load step descriptions from this run
      S.routineSteps = {};
      S.highStakes   = new Set();
      steps.forEach(s => { S.routineSteps[s.index] = {action: s.action, description: s.action}; });

      buildDAG(steps.length);
      steps.forEach(s => updateNode(
        s.index,
        s.status === 'completed' ? 'done' : s.status === 'failed' ? 'failed' :
        s.status === 'halted' ? 'halted' : 'done',
        s.action, s.duration_ms,
        s.monitor_verdict || null
      ));

      $t('iraw', 'Replay: ' + rid);
      $t('iroutine', run.routine_id || '—');
      $t('iconf', Math.round((run.confidence || 0) * 100) + '%');
      $('cbar').style.width = Math.round((run.confidence || 0) * 100) + '%';
      $t('dag-count', steps.length + ' steps (replay)');

      const vc = $('ivars'); vc.innerHTML = '';
      Object.entries(run.variables || {}).forEach(([k, v]) => {
        const r = mk('div', 'vrow');
        r.innerHTML = `<span class="vk">${x(k)}</span><span class="vv">${x(v)}</span>`;
        vc.appendChild(r);
      });
    }).catch(() => {});
}

// ── Monitor ────────────────────────────────────────────────────────────────
function resetMon(){
  $('mbox').className   = 'mbox ok';
  $('mv').className     = 'mv ok';
  $t('mv', '● All Clear');
  $t('mr', 'No anomalies detected');
  $t('mm', '');
  $t('mhist', '');
  hideApproval();
}

function vignette(on){
  document.getElementById('vignette').className = on ? 'on' : '';
}

// ── Status ─────────────────────────────────────────────────────────────────
function setStatus(state, label){
  S.status = state;
  const dot = $('sdot'), txt = $('stxt');
  const live  = state === 'live' || state === 'routing';
  dot.className = 'sdot' + (live ? ' live' : state === 'halted' ? ' halted' : state === 'done' ? ' done' : '');
  txt.textContent = label;
  txt.className   = live ? 'live' : state === 'halted' ? 'halted' : state === 'done' ? 'done' : '';
}

// ── Log ────────────────────────────────────────────────────────────────────
const LOG_MAX = 250;
function log(type, idx, desc, status, dur){
  const body = $('log-body');
  const d = new Date();
  const ts = d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
  const slbl = {ok:'✓ ok', fail:'✕ fail', halt:'■ halt', flag:'▲ flag', act:'◉ …', '':'—'};
  const scls = {ok:'ok', fail:'fail', halt:'halt', flag:'flag', act:'act', '':'ok'};

  const row = mk('div', 'lr');
  row.innerHTML = `
    <span class="lt">${ts}</span>
    <span class="lty">${x(type)}</span>
    <span class="li">${idx !== '—' && idx !== null ? String(idx) : ''}</span>
    <span class="ld">${x(desc || '')}</span>
    <span class="ls ${scls[status] || ''}">${slbl[status] || status || ''}</span>
    <span class="ldur">${dur ? '<span>' + dur + 'ms</span>' : ''}</span>`;
  body.prepend(row);
  while(body.children.length > LOG_MAX) body.removeChild(body.lastChild);
}

// ── Approval timer ─────────────────────────────────────────────────────────
let _approvalTimer   = null;
let _approvalCount   = 30;
let _approvalDefault = 'approve';

function startApprovalTimer(defaultAct){
  _approvalDefault = defaultAct;
  _approvalCount   = 30;
  clearInterval(_approvalTimer);
  _updateCountdown();
  _approvalTimer = setInterval(() => {
    _approvalCount--;
    if(_approvalCount <= 0){
      clearInterval(_approvalTimer);
      $t('approval-countdown', 'Auto-' + _approvalDefault + 'ing…');
      setTimeout(hideApproval, 800);
    } else {
      _updateCountdown();
    }
  }, 1000);
}

function _updateCountdown(){
  $t('approval-countdown',
    'Auto-' + _approvalDefault + ' in ' + _approvalCount + 's  ·  or choose:');
}

function hideApproval(){
  clearInterval(_approvalTimer);
  $('approval').classList.remove('show');
  $('override-row').classList.remove('show');
  $t('approval-countdown', '');
}

function sendDecision(decision){
  hideApproval();
  fetch('/api/control/' + decision, {method: 'POST'}).catch(() => {});
}

function toggleOverride(){
  const r = $('override-row');
  r.classList.toggle('show');
  if(r.classList.contains('show')) $('override-input').focus();
}

function sendOverride(){
  const instr = ($('override-input').value || '').trim();
  if(!instr) return;
  $('override-input').value = '';
  hideApproval();
  fetch('/api/control/override', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({instruction: instr}),
  }).catch(() => {});
}

// ── Deviation badge ─────────────────────────────────────────────────────────
function updateNodeDeviation(i, reason){
  const badge = document.getElementById('dnb-' + i);
  if(!badge) return;
  badge.className = 'dn-mv-badge dev';
  badge.textContent = '⊘ deviated';
  badge.title = reason || 'deviated from recorded demonstration';
}

// ── Evolution stats / confidence bars ──────────────────────────────────────
async function fetchStats(rid){
  try {
    const res = await fetch('/api/routines/' + encodeURIComponent(rid) + '/stats');
    if(!res.ok) return;
    const stats = await res.json();
    (stats || []).forEach(applyNodeStats);
  } catch(_){}
}

function applyNodeStats(s){
  const i = s.step_index;
  if(s.execution_count < 2) return;   // not enough data to show

  // Confidence bar
  const wrap = document.getElementById('dnconf-wrap-' + i);
  const bar  = document.getElementById('dnconf-' + i);
  if(wrap && bar){
    wrap.style.display = '';
    const pct = Math.round(s.confidence * 100);
    bar.style.width = pct + '%';
    bar.className = 'conf-bar ' +
      (s.is_risky ? 'risky' : pct >= 80 ? 'good' : 'warn');
  }

  // Risky badge (replaces empty span)
  const riskEl = document.getElementById('dnrisk-' + i);
  if(riskEl){
    if(s.is_risky){
      riskEl.className  = 'dn-risky';
      riskEl.textContent = '⚠ risky';
    } else {
      riskEl.textContent = '';
    }
  }

  // Historical deviation badge
  if(s.deviation_count > 0){
    updateNodeDeviation(i, `deviated ${s.deviation_count}× in history`);
  }
}

// ── Utils ──────────────────────────────────────────────────────────────────
function $(id)        { return document.getElementById(id); }
function $t(id, text) { const el = document.getElementById(id); if(el) el.textContent = text; }
function mk(tag, cls) { const e = document.createElement(tag); if(cls) e.className = cls; return e; }
function x(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
