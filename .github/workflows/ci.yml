name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  backend:
    name: Backend (import smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --no-dev
      - name: Import smoke test
        run: |
          uv run python -c "
          import shepherd_types
          import config
          from engine.engine import ShepherdExecutionEngine
          from engine.coalescer import submit
          from engine.trace_journal import write, read
          from engine.task_graph import TaskGraphStore
          from engine.routines import load_routines, _build_step
          from shepherd_types import RunTrace, InterventionEvent, TaskGraph, TaskGraphEdge
          print('backend import smoke test OK')
          "
